# File Station v0.3.0 示例配置。
# 运行前请复制本文件为 filestation-v030.yaml，并填写真实 DSM 信息。

# DSM 服务地址，例如：https://nas.example.com:5001
dsmUrl: "http://192.168.210.7:5000/"

# DSM 登录账号。
account: "朱明查看文件专用"

# DSM 登录密码。真实文件 filestation-v030.yaml 已被 .gitignore 忽略，请不要提交。
password: "R?0WrE[f"

# File Station 中用于演示 v0.3.0 功能的远端目录。
# 示例会在该目录下上传临时 PNG 文件，并在结束时清理该文件，请确保指向专用测试目录。
